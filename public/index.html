<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IT Backlog Manager</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <link rel="icon" type="image/png" href="favicon/favicon-96x96.png" sizes="96x96" />
    <link rel="icon" type="image/svg+xml" href="favicon/favicon.svg" />
    <link rel="shortcut icon" href="favicon/favicon.ico" />
    <link rel="apple-touch-icon" sizes="180x180" href="favicon/apple-touch-icon.png" />
    <link rel="manifest" href="favicon/site.webmanifest" />
</head>

<body>
    <header class="glass">
        <div class="logo">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                stroke-linecap="round" stroke-linejoin="round">
                <rect x="2" y="3" width="20" height="14" rx="2" ry="2"></rect>
                <line x1="8" y1="21" x2="16" y2="21"></line>
                <line x1="12" y1="17" x2="12" y2="21"></line>
            </svg>
            IT Backlog Manager
        </div>
        <button id="loginBtn" class="btn btn-outline">Login</button>
        <div id="userProfile" class="hidden">
            <span class="user-badge">Admin</span>
            <button id="logoutBtn" class="btn btn-outline">Logout</button>
        </div>
    </header>

    <main>
        <div class="controls hidden" id="adminControls">
            <button id="addTaskBtn" class="btn btn-primary">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                    stroke-linecap="round" stroke-linejoin="round">
                    <line x1="12" y1="5" x2="12" y2="19"></line>
                    <line x1="5" y1="12" x2="19" y2="12"></line>
                </svg>
                Add Task
            </button>
        </div>

        <div class="board">
            <!-- Planned -->
            <div class="column glass" id="col-planned">
                <div class="column-header">
                    <div class="header-title">
                        <span class="status-dot planned"></span>
                        <h2>Planned</h2>
                    </div>
                    <span class="count">0</span>
                </div>
                <div class="task-list" data-status="planned"></div>
            </div>

            <!-- In Progress -->
            <div class="column glass" id="col-in-progress">
                <div class="column-header">
                    <div class="header-title">
                        <span class="status-dot in-progress"></span>
                        <h2>In Progress</h2>
                    </div>
                    <span class="count">0</span>
                </div>
                <div class="task-list" data-status="in-progress"></div>
            </div>

            <!-- Done -->
            <div class="column glass" id="col-done">
                <div class="column-header">
                    <div class="header-title">
                        <span class="status-dot done"></span>
                        <h2>Done</h2>
                    </div>
                    <span class="count">0</span>
                </div>
                <div class="task-list" data-status="done"></div>
            </div>
        </div>
    </main>

    <!-- Login Modal -->
    <div id="loginModal" class="modal hidden">
        <div class="modal-backdrop"></div>
        <div class="modal-content glass-strong">
            <button class="close-btn">&times;</button>
            <div class="modal-header">
                <h2>Login</h2>
                <p>Admin Panel</p>
            </div>
            <form id="loginForm">
                <div class="form-group">
                    <label>Username</label>
                    <input type="text" id="username" required placeholder="admin">
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" id="password" required placeholder="••••••••">
                </div>
                <p id="loginError" class="error-msg"></p>
                <button type="submit" class="btn btn-primary w-100">Login</button>
            </form>
        </div>
    </div>

    <!-- Task Modal -->
    <div id="taskModal" class="modal hidden">
        <div class="modal-backdrop"></div>
        <div class="modal-content glass-strong">
            <button class="close-btn">&times;</button>
            <div class="modal-header">
                <h2 id="taskModalTitle">New Task</h2>
            </div>
            <form id="taskForm">
                <input type="hidden" id="taskId">
                <div class="form-group">
                    <label>Title</label>
                    <input type="text" id="taskTitle" required placeholder="Replace hard drive in Server-01">
                </div>
                <div class="form-group">
                    <label>Description</label>
                    <textarea id="taskDesc" rows="8" placeholder="Task details..."></textarea>
                </div>
                <input type="hidden" id="taskStatus" value="planned">
                <div class="form-group">
                    <label>Priority</label>
                    <select id="taskPriority">
                        <option value="low">Low</option>
                        <option value="high">High</option>
                    </select>
                </div>
                <div class="form-group checkbox-group">
                    <label style="display: flex; align-items: center; gap: 0.5rem; cursor: pointer;">
                        <input type="checkbox" id="taskDowntime" style="width: auto; margin: 0;">
                        Requires Downtime
                    </label>
                </div>
                <div class="form-actions">
                    <button type="button" class="btn btn-outline" id="cancelTaskBtn">Cancel</button>
                    <button type="submit" class="btn btn-primary">Save</button>
                </div>
            </form>
        </div>
    </div>

    <script src="js/app.js"></script>
</body>

</html>
